<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>Family Savings Club</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f0fdf4; font-family: 'DM Sans', sans-serif; }
    input:focus { border-color: #059669 !important; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;
    const supabase = window.supabase.createClient(
      "https://ouadpnvfyuokbafbmoro.supabase.co",
      "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91YWRwbnZmeXVva2JhZmJtb3JvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTc3NzU0MDcsImV4cCI6MjA5MTM1MTQwN30.LDg3p4ZisgEBF8gV3S5mD6Nc7uQ2ZmHhb30pUwY6HWQ"
    );
    const categories = [
      { label: "Gas & Points", emoji: "⛽" },
      { label: "Groceries", emoji: "🛒" },
      { label: "Coupons / Deals", emoji: "✂️" },
      { label: "Price Compare", emoji: "🔍" },
      { label: "Subscriptions", emoji: "📱" },
      { label: "Other", emoji: "💡" },
    ];
    const girls = ["Lizy", "Madison"];
    function formatMoney(n) {
      const val = Number(n);
      const abs = Math.abs(val).toFixed(2);
      return val < 0 ? `-$${abs}` : `$${abs}`;
    }
    function ClaimCard({ claim, onApprove, onReject, isParent }) {
      const cat = categories.find(c => c.label === claim.category) || categories[5];
      const statusColor = claim.status === "approved" ? "#22c55e" : claim.status === "rejected" ? "#ef4444" : "#f59e0b";
      const statusLabel = claim.status === "approved" ? "✓ Approved" : claim.status === "rejected" ? "✗ Rejected" : "⏳ Pending";
      return (
        <div style={{ background:"white", borderRadius:16, padding:"16px 18px", marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", borderLeft:`4px solid ${statusColor}` }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ flex:1, marginRight:12 }}>
              <div style={{ fontSize:13, color:"#94a3b8", marginBottom:2 }}>{cat.emoji} {claim.category} · {claim.girl}</div>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"#1e293b", marginBottom:4 }}>{claim.description}</div>
              <div style={{ fontSize:13, color:"#64748b" }}>{new Date(claim.date).toLocaleDateString()}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:22, fontWeight:800, color:"#059669" }}>{formatMoney(claim.amount)}</div>
              <div style={{ fontSize:12, fontWeight:600, color:statusColor, marginTop:2 }}>{statusLabel}</div>
            </div>
          </div>
          {claim.note && <div style={{ marginTop:8, fontSize:13, color:"#64748b", fontStyle:"italic" }}>"{claim.note}"</div>}
          {isParent && claim.status === "pending" && (
            <div style={{ display:"flex", gap:8, marginTop:12 }}>
              <button onClick={() => onApprove(claim.id)} style={{ flex:1, padding:"8px 0", borderRadius:10, border:"none", background:"#dcfce7", color:"#15803d", fontWeight:700, cursor:"pointer", fontSize:13 }}>✓ Approve</button>
              <button onClick={() => onReject(claim.id)} style={{ flex:1, padding:"8px 0", borderRadius:10, border:"none", background:"#fee2e2", color:"#dc2626", fontWeight:700, cursor:"pointer", fontSize:13 }}>✗ Reject</button>
            </div>
          )}
        </div>
      );
    }
    function FineCard({ fine }) {
      return (
        <div style={{ background:"white", borderRadius:16, padding:"16px 18px", marginBottom:12, boxShadow:"0 2px 12px rgba(0,0,0,0.07)", borderLeft:"4px solid #ef4444" }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
            <div style={{ flex:1, marginRight:12 }}>
              <div style={{ fontSize:13, color:"#94a3b8", marginBottom:2 }}>🚨 Fine · {fine.girl}</div>
              <div style={{ fontFamily:"'Playfair Display',serif", fontSize:16, fontWeight:700, color:"#1e293b", marginBottom:4 }}>{fine.offense}</div>
              <div style={{ fontSize:13, color:"#64748b" }}>{new Date(fine.date).toLocaleDateString()}</div>
              <div style={{ fontSize:12, color:"#ef4444", fontWeight:600, marginTop:2 }}>Offense #{fine.offense_count}</div>
            </div>
            <div style={{ textAlign:"right" }}>
              <div style={{ fontSize:22, fontWeight:800, color:"#ef4444" }}>-{formatMoney(fine.amount)}</div>
            </div>
          </div>
        </div>
      );
    }
    function App() {
      const [view, setView] = useState("home");
      const [parentTab, setParentTab] = useState("review");
      const [claims, setClaims] = useState([]);
      const [fines, setFines] = useState([]);
      const [loading, setLoading] = useState(true);
      const [error, setError] = useState(null);
      const [isParent, setIsParent] = useState(false);
      const [parentPin, setParentPin] = useState("");
      const [pinError, setPinError] = useState(false);
      const [form, setForm] = useState({ girl: girls[0], category: categories[0].label, description:"", amount:"", note:"" });
      const [fineForm, setFineForm] = useState({ girl: girls[0], offense:"" });
      const [submitted, setSubmitted] = useState(false);
      const [submitting, setSubmitting] = useState(false);
      const [fineSubmitting, setFineSubmitting] = useState(false);
      const [finePreview, setFinePreview] = useState(null);
      const PIN = "1234";
      const fetchAll = async () => {
        try {
          const [cr, fr] = await Promise.all([
            supabase.from("claims").select("*").order("date", { ascending: false }),
            supabase.from("fines").select("*").order("date", { ascending: false }),
          ]);
          if (cr.error) throw cr.error;
          if (fr.error) throw fr.error;
          setClaims(cr.data || []);
          setFines(fr.data || []);
          setError(null);
        } catch(e) {
          setError("Could not load data. Check your connection.");
        }
        setLoading(false);
      };
      useEffect(() => {
        fetchAll();
        const channel = supabase.channel("all-changes")
          .on("postgres_changes", { event:"*", schema:"public", table:"claims" }, fetchAll)
          .on("postgres_changes", { event:"*", schema:"public", table:"fines" }, fetchAll)
          .subscribe();
        return () => supabase.removeChannel(channel);
      }, []);
      const getOffenseCount = (girl, offense) => {
        if (!offense.trim()) return 0;
        const n = offense.trim().toLowerCase();
        return fines.filter(f => f.girl === girl && f.offense.toLowerCase() === n).length;
      };
      useEffect(() => {
        if (fineForm.offense.trim()) setFinePreview(getOffenseCount(fineForm.girl, fineForm.offense) + 1);
        else setFinePreview(null);
      }, [fineForm.girl, fineForm.offense, fines]);
      const submitClaim = async () => {
        if (!form.description || !form.amount || isNaN(Number(form.amount))) return;
        setSubmitting(true);
        await supabase.from("claims").insert([{ girl:form.girl, category:form.category, description:form.description, amount:parseFloat(form.amount), note:form.note, status:"pending", date:new Date().toISOString() }]);
        setSubmitting(false);
        setForm({ girl:girls[0], category:categories[0].label, description:"", amount:"", note:"" });
        setSubmitted(true);
        setTimeout(() => { setSubmitted(false); setView("home"); }, 2000);
      };
      const issueFine = async () => {
        if (!fineForm.offense.trim()) return;
        setFineSubmitting(true);
        const count = getOffenseCount(fineForm.girl, fineForm.offense);
        await supabase.from("fines").insert([{ girl:fineForm.girl, offense:fineForm.offense.trim(), amount:count+1, offense_count:count+1, date:new Date().toISOString() }]);
        setFineSubmitting(false);
        setFineForm({ girl:girls[0], offense:"" });
        setFinePreview(null);
      };
      const updateStatus = async (id, status) => { await supabase.from("claims").update({ status }).eq("id", id); };
      const enterParent = () => {
        if (parentPin === PIN) { setIsParent(true); setPinError(false); setView("parent"); setParentPin(""); }
        else setPinError(true);
      };
      const totalApproved = g => claims.filter(c => c.girl===g && c.status==="approved").reduce((s,c)=>s+c.amount,0);
      const totalFined = g => fines.filter(f => f.girl===g).reduce((s,f)=>s+f.amount,0);
      const netBalance = g => totalApproved(g) - totalFined(g);
      const pending = claims.filter(c => c.status==="pending");
      const ls = { display:"block", fontSize:12, fontWeight:700, color:"#475569", marginBottom:6, letterSpacing:0.5, textTransform:"uppercase" };
      const is = { width:"100%", padding:"12px 14px", borderRadius:12, border:"2px solid #e2e8f0", fontSize:15, marginBottom:16, boxSizing:"border-box", outline:"none", fontFamily:"inherit" };
      return (
        <div style={{ minHeight:"100vh", background:"linear-gradient(145deg,#f0fdf4,#ecfdf5,#f0f9ff)", fontFamily:"'DM Sans',sans-serif", maxWidth:420, margin:"0 auto", paddingBottom:80 }}>
          <div style={{ background:"white", padding:"20px 20px 16px", boxShadow:"0 2px 12px rgba(0,0,0,0.06)", position:"sticky", top:0, zIndex:10 }}>
            <div style={{ fontSize:11, fontWeight:700, letterSpacing:2, color:"#94a3b8", textTransform:"uppercase", marginBottom:2 }}>Family</div>
            <div style={{ fontFamily:"'Playfair Display',serif", fontSize:26, fontWeight:800, color:"#064e3b" }}>Savings Club 💰</div>
            {isParent && pending.length > 0 && (
              <div style={{ marginTop:6, fontSize:12, color:"#b45309", fontWeight:600, background:"#fef3c7", borderRadius:8, padding:"3px 10px", display:"inline-block" }}>
                {pending.length} claim{pending.length>1?"s":""} waiting
              </div>
            )}
          </div>
          <div style={{ padding:"20px 16px" }}>
            {error && <div style={{ background:"#fee2e2", color:"#dc2626", borderRadius:12, padding:"12px 16px", marginBottom:16, fontSize:14, fontWeight:600 }}>{error}</div>}
            {view==="home" && (
              <>
                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12, marginBottom:20 }}>
                  {girls.map(g => {
                    const net = netBalance(g); const isNeg = net < 0;
                    return (
                      <div key={g} style={{ background:"white", borderRadius:18, padding:"18px 16px", boxShadow:"0 2px 12px rgba(0,0,0,0.07)", textAlign:"center" }}>
                        <div style={{ fontSize:28, marginBottom:4 }}>👧</div>
                        <div style={{ fontWeight:700, fontSize:15, color:"#1e293b", marginBottom:6 }}>{g}</div>
                        <div style={{ fontSize:28, fontWeight:800, color:isNeg?"#ef4444":"#059669", fontFamily:"'Playfair Display',serif" }}>{formatMoney(net)}</div>
                        <div style={{ fontSize:11, color:"#94a3b8", fontWeight:600, marginTop:2 }}>{isNeg?"owes you":"earned"}</div>
                        <div style={{ marginTop:6, fontSize:11, color:"#64748b" }}>+{formatMoney(totalApproved(g))} / -{formatMoney(totalFined(g))}</div>
                        <div style={{ marginTop:6, fontSize:12, color:"#f59e0b", fontWeight:600 }}>
                          {claims.filter(c=>c.girl===g&&c.status==="pending").length>0 ? `${claims.filter(c=>c.girl===g&&c.status==="pending").length} pending` : "✓ All clear"}
                        </div>
                      </div>
                    );
                  })}
                </div>
                <div style={{ fontWeight:700, fontSize:14, color:"#475569", marginBottom:10 }}>RECENT ACTIVITY</div>
                {loading && <div style={{ textAlign:"center", color:"#94a3b8", padding:30 }}>Loading...</div>}
                {[...claims.slice(0,2).map(c=>({...c,_type:"claim"})), ...fines.slice(0,2).map(f=>({...f,_type:"fine"}))]
                  .sort((a,b)=>new Date(b.date)-new Date(a.date)).slice(0,4)
                  .map(item => item._type==="fine" ? <FineCard key={"f"+item.id} fine={item}/> : <ClaimCard key={"c"+item.id} claim={item} isParent={false}/>)}
                {!loading && claims.length===0 && fines.length===0 && <div style={{ textAlign:"center", color:"#94a3b8", padding:"30px 0", fontSize:14 }}>No activity yet — submit your first save!</div>}
                {(claims.length>2||fines.length>2) && <button onClick={()=>setView("history")} style={{ width:"100%", padding:12, border:"none", background:"transparent", color:"#059669", fontWeight:700, cursor:"pointer", fontSize:14 }}>View full history →</button>}
              </>
            )}
            {view==="submit" && (
              <div style={{ background:"white", borderRadius:20, padding:20, boxShadow:"0 2px 16px rgba(0,0,0,0.08)" }}>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:800, color:"#064e3b", marginBottom:18 }}>Submit a Save 🎉</div>
                {submitted ? (
                  <div style={{ textAlign:"center", padding:"40px 0" }}>
                    <div style={{ fontSize:50 }}>🎊</div>
                    <div style={{ fontWeight:700, fontSize:18, color:"#059669", marginTop:12 }}>Claim submitted!</div>
                    <div style={{ color:"#64748b", marginTop:4 }}>Waiting for approval</div>
                  </div>
                ) : (
                  <>
                    <label style={ls}>Who's submitting?</label>
                    <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                      {girls.map(g => <button key={g} onClick={()=>setForm({...form,girl:g})} style={{ flex:1, padding:"10px 0", borderRadius:12, border:`2px solid ${form.girl===g?"#059669":"#e2e8f0"}`, background:form.girl===g?"#dcfce7":"white", fontWeight:700, cursor:"pointer", color:form.girl===g?"#065f46":"#64748b" }}>{g}</button>)}
                    </div>
                    <label style={ls}>Category</label>
                    <div style={{ display:"flex", flexWrap:"wrap", gap:8, marginBottom:16 }}>
                      {categories.map(c => <button key={c.label} onClick={()=>setForm({...form,category:c.label})} style={{ padding:"7px 12px", borderRadius:20, border:`2px solid ${form.category===c.label?"#059669":"#e2e8f0"}`, background:form.category===c.label?"#dcfce7":"white", fontWeight:600, cursor:"pointer", fontSize:13, color:form.category===c.label?"#065f46":"#64748b" }}>{c.emoji} {c.label}</button>)}
                    </div>
                    <label style={ls}>What did you save on?</label>
                    <input value={form.description} onChange={e=>setForm({...form,description:e.target.value})} placeholder="e.g. Kroger gas points" style={is}/>
                    <label style={ls}>Amount saved ($)</label>
                    <input value={form.amount} onChange={e=>setForm({...form,amount:e.target.value})} placeholder="5.00" type="number" step="0.01" style={is}/>
                    <label style={ls}>Note (optional)</label>
                    <input value={form.note} onChange={e=>setForm({...form,note:e.target.value})} placeholder="Any extra details..." style={is}/>
                    <button onClick={submitClaim} disabled={submitting} style={{ width:"100%", padding:"14px 0", borderRadius:14, border:"none", background:submitting?"#94a3b8":"linear-gradient(135deg,#059669,#0d9488)", color:"white", fontWeight:800, fontSize:16, cursor:submitting?"not-allowed":"pointer", marginTop:8 }}>
                      {submitting?"Submitting...":"Submit Claim ✓"}
                    </button>
                  </>
                )}
              </div>
            )}
            {view==="history" && (
              <>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:800, color:"#064e3b", marginBottom:16 }}>Full History</div>
                {[...claims.map(c=>({...c,_type:"claim"})),...fines.map(f=>({...f,_type:"fine"}))]
                  .sort((a,b)=>new Date(b.date)-new Date(a.date))
                  .map(item=>item._type==="fine"?<FineCard key={"f"+item.id} fine={item}/>:<ClaimCard key={"c"+item.id} claim={item} isParent={false}/>)}
                {claims.length===0&&fines.length===0&&!loading&&<div style={{ textAlign:"center", color:"#94a3b8", padding:40 }}>No activity yet</div>}
              </>
            )}
            {view==="parent" && !isParent && (
              <div style={{ background:"white", borderRadius:20, padding:24, boxShadow:"0 2px 16px rgba(0,0,0,0.08)", textAlign:"center" }}>
                <div style={{ fontSize:40, marginBottom:12 }}>🔐</div>
                <div style={{ fontFamily:"'Playfair Display',serif", fontSize:20, fontWeight:800, color:"#1e293b", marginBottom:6 }}>Parent Login</div>
                <div style={{ color:"#64748b", fontSize:14, marginBottom:20 }}>Default PIN is 1234</div>
                <input value={parentPin} onChange={e=>setParentPin(e.target.value)} onKeyDown={e=>e.key==="Enter"&&enterParent()} type="password" placeholder="Enter PIN" style={{...is,textAlign:"center",fontSize:20,letterSpacing:8}}/>
                {pinError&&<div style={{ color:"#ef4444", fontSize:13, marginTop:-8, marginBottom:8 }}>Wrong PIN</div>}
                <button onClick={enterParent} style={{ width:"100%", padding:"13px 0", borderRadius:14, border:"none", background:"#1e293b", color:"white", fontWeight:700, fontSize:15, cursor:"pointer" }}>Enter</button>
              </div>
            )}
            {view==="parent" && isParent && (
              <>
                <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16 }}>
                  <div style={{ fontFamily:"'Playfair Display',serif", fontSize:22, fontWeight:800, color:"#064e3b" }}>Parent Panel</div>
                  <button onClick={()=>{setIsParent(false);setView("home");}} style={{ fontSize:12, color:"#94a3b8", background:"none", border:"none", cursor:"pointer" }}>Logout</button>
                </div>
                <div style={{ background:"white", borderRadius:16, padding:16, marginBottom:16, boxShadow:"0 2px 12px rgba(0,0,0,0.07)" }}>
                  <div style={{ fontWeight:700, fontSize:13, color:"#475569", marginBottom:10 }}>NET BALANCES</div>
                  {girls.map(g=>{
                    const net=netBalance(g); const isNeg=net<0;
                    return (
                      <div key={g} style={{ display:"flex", justifyContent:"space-between", alignItems:"center", padding:"8px 0", borderBottom:"1px solid #f1f5f9" }}>
                        <div><span style={{ fontWeight:600 }}>{g}</span><span style={{ fontSize:12, color:"#94a3b8", marginLeft:8 }}>+{formatMoney(totalApproved(g))} / -{formatMoney(totalFined(g))}</span></div>
                        <span style={{ fontWeight:800, color:isNeg?"#ef4444":"#059669" }}>{formatMoney(net)}{isNeg?" 💸 owes you":""}</span>
                      </div>
                    );
                  })}
                </div>
                <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                  {[{id:"review",label:"📋 Review Claims"},{id:"fines",label:"🚨 Issue Fine"}].map(tab=>(
                    <button key={tab.id} onClick={()=>setParentTab(tab.id)} style={{ flex:1, padding:"10px 0", borderRadius:12, border:`2px solid ${parentTab===tab.id?"#ef4444":"#e2e8f0"}`, background:parentTab===tab.id?"#fee2e2":"white", fontWeight:700, cursor:"pointer", fontSize:13, color:parentTab===tab.id?"#dc2626":"#64748b" }}>{tab.label}</button>
                  ))}
                </div>
                {parentTab==="review" && (
                  <>
                    {pending.length===0&&<div style={{ textAlign:"center", color:"#94a3b8", padding:30, background:"white", borderRadius:16 }}>✓ All caught up</div>}
                    {pending.map(c=><ClaimCard key={c.id} claim={c} onApprove={id=>updateStatus(id,"approved")} onReject={id=>updateStatus(id,"rejected")} isParent={true}/>)}
                    <div style={{ fontWeight:700, fontSize:13, color:"#475569", margin:"20px 0 10px" }}>HISTORY</div>
                    {claims.filter(c=>c.status!=="pending").map(c=><ClaimCard key={c.id} claim={c} isParent={false}/>)}
                  </>
                )}
                {parentTab==="fines" && (
                  <>
                    <div style={{ background:"white", borderRadius:20, padding:20, boxShadow:"0 2px 16px rgba(0,0,0,0.08)", marginBottom:16 }}>
                      <div style={{ fontFamily:"'Playfair Display',serif", fontSize:18, fontWeight:800, color:"#dc2626", marginBottom:16 }}>Issue a Fine 🚨</div>
                      <label style={ls}>Who's being fined?</label>
                      <div style={{ display:"flex", gap:8, marginBottom:16 }}>
                        {girls.map(g=><button key={g} onClick={()=>setFineForm({...fineForm,girl:g})} style={{ flex:1, padding:"10px 0", borderRadius:12, border:`2px solid ${fineForm.girl===g?"#ef4444":"#e2e8f0"}`, background:fineForm.girl===g?"#fee2e2":"white", fontWeight:700, cursor:"pointer", color:fineForm.girl===g?"#dc2626":"#64748b" }}>{g}</button>)}
                      </div>
                      <label style={ls}>What did they do?</label>
                      <input value={fineForm.offense} onChange={e=>setFineForm({...fineForm,offense:e.target.value})} placeholder="e.g. Left lights on" style={is}/>
                      {finePreview && (
                        <div style={{ background:"#fef3c7", borderRadius:12, padding:"12px 16px", marginBottom:16, display:"flex", justifyContent:"space-between", alignItems:"center" }}>
                          <div>
                            <div style={{ fontWeight:700, fontSize:13, color:"#92400e" }}>Fine Preview</div>
                            <div style={{ fontSize:12, color:"#b45309", marginTop:2 }}>Offense #{finePreview} for {fineForm.girl}</div>
                          </div>
                          <div style={{ fontSize:24, fontWeight:800, color:"#dc2626" }}>-${finePreview}.00</div>
                        </div>
                      )}
                      <button onClick={issueFine} disabled={fineSubmitting||!fineForm.offense.trim()} style={{ width:"100%", padding:"14px 0", borderRadius:14, border:"none", background:(!fineForm.offense.trim()||fineSubmitting)?"#94a3b8":"linear-gradient(135deg,#dc2626,#ef4444)", color:"white", fontWeight:800, fontSize:16, cursor:(!fineForm.offense.trim()||fineSubmitting)?"not-allowed":"pointer" }}>
                        {fineSubmitting?"Issuing...":"Issue Fine 🚨"}
                      </button>
                    </div>
                    <div style={{ fontWeight:700, fontSize:13, color:"#475569", marginBottom:10 }}>FINE HISTORY</div>
                    {fines.length===0&&<div style={{ textAlign:"center", color:"#94a3b8", padding:30, background:"white", borderRadius:16 }}>No fines yet 🙌</div>}
                    {fines.map(f=><FineCard key={f.id} fine={f}/>)}
                  </>
                )}
              </>
            )}
          </div>
          <div style={{ position:"fixed", bottom:0, left:"50%", transform:"translateX(-50%)", width:"100%", maxWidth:420, background:"white", borderTop:"1px solid #f1f5f9", display:"flex", padding:"10px 0 16px", boxShadow:"0 -4px 20px rgba(0,0,0,0.06)" }}>
            {[{id:"home",emoji:"🏠",label:"Home"},{id:"submit",emoji:"➕",label:"Submit"},{id:"history",emoji:"📋",label:"History"},{id:"parent",emoji:"👤",label:"Parent"}].map(tab=>(
              <button key={tab.id} onClick={()=>{if(tab.id!=="parent")setIsParent(false);setView(tab.id);}} style={{ flex:1, background:"none", border:"none", cursor:"pointer", display:"flex", flexDirection:"column", alignItems:"center", gap:3 }}>
                <span style={{ fontSize:22 }}>{tab.emoji}</span>
                <span style={{ fontSize:11, fontWeight:700, color:view===tab.id?"#059669":"#94a3b8" }}>{tab.label}</span>
                {view===tab.id&&<div style={{ width:4, height:4, borderRadius:"50%", background:"#059669" }}/>}
              </button>
            ))}
          </div>
        </div>
      );
    }
    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App/>);
  </script>
</body>
</html>
